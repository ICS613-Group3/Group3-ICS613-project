# toolsharing-nginx.conf — Nginx site for Neighborhood Tool Sharing
#
# Serves the built frontend as static files, reverse-proxies API and
# upload requests to the FastAPI backend on localhost:8000.
#
# For production, add SSL (see DEPLOY_GCE.md § "HTTPS with Certbot").

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ── Frontend static files ────────────────────────────────────────────
    root /var/www/toolsharing;
    index index.html;

    # ── API reverse proxy ────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Increase body size for tool photo uploads (max 5 MB)
        client_max_body_size 6m;
    }

    # ── Uploads (tool photos) ────────────────────────────────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 6m;
    }

    # ── OpenAPI docs (served by FastAPI) ──────────────────────────────────
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────
    # All other routes serve static files if they exist, otherwise fall
    # back to index.html so React Router handles the client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip compression ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── Logging ──────────────────────────────────────────────────────────
    access_log /var/log/nginx/toolsharing-access.log;
    error_log  /var/log/nginx/toolsharing-error.log;
}
