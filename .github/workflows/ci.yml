name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests (unit + acceptance)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ics613user
          POSTGRES_PASSWORD: ics613password  # pragma: allowlist secret -- throwaway CI-only Postgres container credential, not a real secret
          POSTGRES_DB: toolsharing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ics613user -d toolsharing_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # No backend/.env is created here on purpose: every Settings field has
      # a default (app/config.py), and conftest.py sets the handful of
      # test-critical env vars (DATABASE_URL, SECRET_KEY, DISABLE_SCHEDULER)
      # itself before the app is imported. Verified locally that the full
      # suite passes with no .env file present at all.
      #
      # pytest-github-actions-annotate-failures (see requirements.txt) turns
      # each FAILED test into an inline `::error file=...,line=...::`
      # annotation automatically -- no flag needed here, it activates because
      # GITHUB_ACTIONS is set in this environment. It also annotates captured
      # warnings, so expect some `::warning::` noise from recurring
      # deprecation warnings -- harmless, just noisier than pure failures.
      #
      # -rxXs makes pytest print each xfailed/xpassed/skipped test's reason
      # in the "short test summary info" block (off by default) -- without
      # it, the gap-tracker section below would be empty even though we do
      # have skips/xfails.
      #
      # `set -o pipefail` makes sure a pytest failure still fails the step
      # even though its output is piped through `tee` (otherwise the
      # pipeline's exit code would be tee's, which is always 0).
      - name: Run backend test suite (unit + acceptance)
        run: |
          set -o pipefail
          pytest src/app/tests -q -rxXs \
            --cov=app --cov-report=term-missing --cov-report=xml --cov-report=html \
            | tee pytest-output.log

      - name: Write test summary
        if: always()
        run: |
          {
            echo "## Backend test results"
            echo
            echo '```'
            tail -n 1 pytest-output.log
            echo '```'
            echo
            echo "<details><summary>Skipped / expected-failure details (gap tracker)</summary>"
            echo
            echo '```'
            awk '/short test summary info/{flag=1} flag' pytest-output.log | sed '$d'
            echo '```'
            echo "</details>"
            echo
            echo "<details><summary>Coverage report</summary>"
            echo
            echo '```'
            awk '/^Name /{flag=1} flag' pytest-output.log
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: backend/htmlcov/
          retention-days: 14

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          retention-days: 14

  backend-lint:
    name: Backend lint, format, type-check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # --output-format=github makes ruff emit the same inline
      # `::error file=...,line=...::` annotations as the pytest plugin, so
      # lint violations show up on the Checks tab / PR diff the same way
      # test failures do.
      - name: ruff check
        run: ruff check src/ --output-format=github

      - name: ruff format --check
        run: ruff format --check src/

      - name: mypy
        run: mypy src/

      # -c pyproject.toml is required: bandit does not auto-discover
      # pyproject.toml the way ruff/mypy do, it must be pointed at it.
      # Findings accepted as false positives are documented inline with
      # `# nosec <check-id> -- <reason>` rather than silenced globally,
      # so the check stays effective against future real findings.
      - name: bandit
        run: bandit -r src/app -c pyproject.toml

  frontend-checks:
    name: Frontend lint, typecheck, build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc -b

      - name: Build
        run: npm run build

  frontend-e2e:
    name: Frontend E2E tests (Playwright)
    runs-on: ubuntu-latest

    # A real backend + Postgres are needed here (not just the frontend dev
    # server) because LoginPage now calls the real POST /api/v1/auth/login
    # instead of frontend-only mock auth. Mirrors backend-tests' Postgres
    # service below.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ics613user
          POSTGRES_PASSWORD: ics613password  # pragma: allowlist secret -- throwaway CI-only Postgres container credential, not a real secret
          POSTGRES_DB: toolsharing_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ics613user -d toolsharing_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://ics613user:ics613password@localhost:5432/toolsharing_e2e  # pragma: allowlist secret -- throwaway CI-only Postgres connection string, not a real secret
      SECRET_KEY: test-secret-key-for-e2e-only-32-chars-min-ok  # pragma: allowlist secret -- throwaway CI-only JWT signing key, not a real secret
      DISABLE_SCHEDULER: "true"
      # Fixed (not randomly generated) so login.spec.ts can log in as a
      # known seeded user. Matches LoginPage's demo helper text.
      SEED_PASSWORD: devpass123  # pragma: allowlist secret -- throwaway CI-only seed account password, not a real secret
      SKIP_SEED_PASSWORD_PRINT: "1"
      VITE_API_TARGET: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Seed deterministic test data
        working-directory: backend
        run: python scripts/seed_dev.py

      # Started in the background and polled on /api/v1/health (see
      # backend/src/app/api/v1/health.py) rather than a fixed sleep, so the
      # job fails fast with a clear error if the server never comes up
      # instead of racing Playwright against a not-yet-ready backend.
      - name: Start backend server
        working-directory: backend
        run: |
          nohup python -m uvicorn app.main:app --app-dir src \
            --host 0.0.0.0 --port 8000 > backend-e2e.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health > /dev/null; then
              echo "Backend is up."
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become healthy in time." >&2
          cat backend-e2e.log
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-log
          path: backend/backend-e2e.log
          retention-days: 14

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  secrets-scan:
    name: Secrets scan (detect-secrets)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install pre-commit
        run: pip install 'pre-commit>=4.0,<5.0'

      # Caches each hook's isolated environment (detect-secrets itself,
      # pinned via `rev:` in .pre-commit-config.yaml) so this job doesn't
      # reinstall it on every run.
      - name: Cache pre-commit hook environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      # Runs the same detect-secrets check contributors run locally via
      # `pre-commit install`, against all tracked files (not just staged
      # ones), so a PR can't slip a secret past CI even from a contributor
      # who skipped installing the hook locally.
      - name: pre-commit (detect-secrets)
        run: pre-commit run --all-files --show-diff-on-failure detect-secrets

  frontend-semgrep:
    name: Frontend SAST (semgrep)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      # semgrep is pip-installed rather than declared in a requirements
      # file because frontend/ has no Python dependency manifest -- this
      # is the only Python tool that touches frontend/, so its version is
      # pinned at the point of installation instead.
      - name: Install semgrep
        run: pip install 'semgrep>=1.169,<2.0'

      # Scoped to frontend/src only (mirrors eslint.config.js's `files:
      # ['src/**/*.{ts,tsx}']` scoping) -- e2e/ is Playwright test code,
      # not app source. p/react + p/typescript: framework/language-
      # specific rules. p/owasp-top-ten: broader web-vuln coverage not
      # specific to React. Deliberately not running semgrep's Python
      # rules -- bandit already covers backend/ (see backend-lint's
      # bandit step) and they'd mostly duplicate it.
      # `semgrep scan` (not `semgrep ci`) is used deliberately: `semgrep
      # ci` needs a Semgrep App account/token this repo doesn't have
      # configured. `--error` is required because `semgrep scan` exits 0
      # on findings by default. Verified locally at introduction time: 0
      # findings against frontend/src with this exact ruleset, so this
      # starts as a real blocking gate rather than continue-on-error.
      # Suppress genuine future false positives inline with a reasoned
      # `// nosemgrep: <rule-id> -- reason` comment, mirroring bandit's
      # `# nosec` convention, rather than disabling rules globally.
      - name: semgrep (frontend SAST)
        run: |
          semgrep scan \
            --config p/react \
            --config p/typescript \
            --config p/owasp-top-ten \
            --error \
            frontend/src
